<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundry Kiosk Editor — edit copy &amp; export print-ready PDFs</title>
<style>
  /* Archivo (variable, weights 100–900) — embedded so PDFs are brand-correct on any
     machine / at the print shop. Vendored woff2 (SIL OFL), loaded offline. */
  @font-face{font-family:'Archivo';font-style:normal;font-weight:100 900;font-display:swap;
    src:url('vendor/fonts/archivo-wght-normal.woff2') format('woff2');}
  @font-face{font-family:'Archivo';font-style:italic;font-weight:100 900;font-display:swap;
    src:url('vendor/fonts/archivo-wght-italic.woff2') format('woff2');}
  /* Trade Gothic LT Std (Babson brand) — embedded under the project's web-font license.
     Archivo is the fallback if a weight is missing. */
  @font-face{font-family:'Trade Gothic';font-style:normal;font-weight:300;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd-Light.otf') format('opentype');}
  @font-face{font-family:'Trade Gothic';font-style:normal;font-weight:400;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd.otf') format('opentype');}
  @font-face{font-family:'Trade Gothic';font-style:normal;font-weight:500 700;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd-Bold.otf') format('opentype');}
  @font-face{font-family:'Trade Gothic';font-style:normal;font-weight:800 900;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd-Bd2.otf') format('opentype');}
  @font-face{font-family:'Trade Gothic';font-style:italic;font-weight:400;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd-Obl.otf') format('opentype');}
  @font-face{font-family:'Trade Gothic';font-style:italic;font-weight:500 700;font-display:swap;src:url('vendor/fonts/TradeGothicLTStd-BoldObl.otf') format('opentype');}
  :root{
    --green:#0d5b3e; --forest:#063d2a; --gold:#f2b417; --teal:#6cc5c0; --sage:#7fa653;
    --paper:#f7f4ec; --ink:#0a261b;
    --in:8.38px; /* design scale: 1 inch = 8.38 design px (matches the renders) */
    --ui:#1d2b25; --uipanel:#24332c; --uiline:#33473d; --uitext:#e8efe9; --uimut:#9fb3a8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:'Trade Gothic','Archivo',system-ui,-apple-system,sans-serif;color:var(--uitext);background:#101713;}

  /* ---------------- app shell ---------------- */
  .app{display:grid;grid-template-columns:380px 1fr;grid-template-rows:52px 1fr;height:100vh;}
  .topbar{grid-column:1 / -1;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--ui);border-bottom:1px solid var(--uiline);}
  .topbar .brand{font-weight:900;letter-spacing:-.01em;font-size:15px;text-transform:uppercase;color:#fff;}
  .topbar .brand span{color:var(--gold);}
  .topbar .tabs{display:flex;gap:4px;margin-left:6px;}
  .tab{appearance:none;border:1px solid var(--uiline);background:transparent;color:var(--uimut);font:inherit;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:7px;cursor:pointer;}
  .tab:hover{color:#fff;}
  .tab.on{background:var(--green);border-color:var(--green);color:#fff;}
  .topbar .spacer{flex:1;}
  .topbar .meta{font-size:11px;color:var(--uimut);}

  .editor{background:var(--ui);border-right:1px solid var(--uiline);overflow-y:auto;padding:14px 14px 60px;}
  .editor .hint{font-size:11px;line-height:1.5;color:var(--uimut);background:var(--uipanel);border:1px solid var(--uiline);border-radius:8px;padding:8px 10px;margin:0 0 14px;}
  .editor .hint code{background:#0d1511;color:var(--gold);padding:1px 4px;border-radius:3px;font-size:10.5px;}
  .grp{margin:0 0 16px;}
  .grp > h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:0 0 8px;font-weight:800;}
  .fld{display:block;margin:0 0 9px;}
  .fld > span{display:block;font-size:11px;color:var(--uimut);margin:0 0 3px;font-weight:600;}
  .fld input,.fld textarea,.fld select{width:100%;font:inherit;font-size:13px;color:var(--uitext);background:#0e1714;border:1px solid var(--uiline);border-radius:7px;padding:7px 9px;resize:vertical;}
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--teal);}
  .fld textarea{line-height:1.4;}
  .imrow{display:flex;gap:10px;align-items:center;}
  .imthumb{width:46px;height:46px;flex:0 0 auto;border-radius:6px;object-fit:cover;border:1px solid var(--uiline);background:#0e1714 center/cover no-repeat;}
  .imthumb.empty{display:flex;align-items:center;justify-content:center;font-size:8.5px;color:#5e7068;text-align:center;line-height:1.1;}
  .imbtns{display:flex;gap:6px;flex-wrap:wrap;}
  .imbtn{font-size:11.5px;padding:5px 10px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  /* section manager */
  .secmgr{margin:0 0 2px;}
  .secitem{background:#0e1714;border:1px solid var(--uiline);border-radius:8px;margin-bottom:6px;}
  .secitem.dragging{opacity:.4;border-color:var(--gold);}
  .secrow{display:flex;align-items:center;gap:8px;padding:7px 9px;}
  .secrow .grip{color:var(--uimut);cursor:grab;font-size:12px;letter-spacing:-3px;user-select:none;padding-right:2px;}
  .secrow input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer;flex:0 0 auto;}
  .secrow .secname{flex:1;font-size:12.5px;font-weight:600;color:var(--uitext);}
  .secrow .secname em{font-style:normal;color:var(--uimut);font-size:10.5px;font-weight:500;}
  .secdel{appearance:none;border:none;background:transparent;color:var(--uimut);cursor:pointer;font-size:13px;line-height:1;padding:3px 5px;border-radius:5px;}
  .secdel:hover{color:#ff9b9b;background:rgba(255,255,255,.05);}
  .secbody{padding:0 9px 9px;display:flex;flex-direction:column;gap:6px;}
  .secbody .srow2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .secopt{display:flex;align-items:center;gap:8px;padding:0 9px 9px;}
  .secopt > span{font-size:11px;color:var(--uimut);font-weight:600;}
  .secopt select{flex:1;font:inherit;font-size:12px;color:var(--uitext);background:#0b120f;border:1px solid var(--uiline);border-radius:6px;padding:5px 7px;cursor:pointer;}
  .secopt select:focus{outline:none;border-color:var(--teal);}
  .secfld{width:100%;font:inherit;font-size:12.5px;color:var(--uitext);background:#0b120f;border:1px solid var(--uiline);border-radius:6px;padding:6px 8px;resize:vertical;}
  .secfld:focus{outline:none;border-color:var(--teal);}
  .secadd{width:100%;font:inherit;font-size:12.5px;font-weight:600;color:var(--gold);background:#0e1714;border:1px dashed var(--uiline);border-radius:8px;padding:8px 9px;cursor:pointer;margin-top:2px;}
  .sechint{font-size:10.5px;line-height:1.4;color:var(--uimut);margin:7px 2px 0;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
  .subcard{border:1px solid var(--uiline);border-radius:8px;padding:9px 9px 2px;margin:0 0 9px;background:rgba(255,255,255,.015);}
  .subcard > .lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);font-weight:800;margin:0 0 7px;}
  .editor code{background:#0d1511;color:var(--gold);padding:1px 4px;border-radius:3px;font-size:10.5px;}
  .editor .note{font-size:11px;line-height:1.5;color:var(--uimut);background:rgba(108,197,192,.08);border-left:2px solid var(--teal);border-radius:0 6px 6px 0;padding:7px 10px;margin:0 0 9px;}
  .editor .note b{color:#cfe6e3;}
  .adv{border:1px solid var(--uiline);border-radius:8px;margin:0 0 9px;background:rgba(255,255,255,.015);}
  .adv > summary{cursor:pointer;font-size:11px;font-weight:700;color:var(--teal);padding:8px 10px;list-style:none;user-select:none;}
  .adv > summary::-webkit-details-marker{display:none;}
  .adv > summary::before{content:'▸';color:var(--uimut);margin-right:6px;display:inline-block;}
  .adv[open] > summary::before{content:'▾';}
  .adv[open] > summary{border-bottom:1px solid var(--uiline);}
  .advbody{padding:9px 10px 2px;}
  .fld textarea{overflow:hidden;min-height:38px;}

  /* ---------------- preview side ---------------- */
  .right{display:flex;flex-direction:column;min-width:0;background:#0f1612;}
  .ctrl{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--uiline);background:var(--ui);flex-wrap:wrap;}
  .ctrl label.sel{font-size:11px;color:var(--uimut);font-weight:600;display:flex;align-items:center;gap:7px;}
  .ctrl select{font:inherit;font-size:13px;font-weight:600;color:var(--uitext);background:#0e1714;border:1px solid var(--uiline);border-radius:7px;padding:6px 9px;min-width:230px;}
  .ctrl .spacer{flex:1;}
  .btn{appearance:none;font:inherit;font-size:13px;font-weight:700;border-radius:8px;padding:8px 14px;cursor:pointer;border:1px solid var(--uiline);background:var(--uipanel);color:var(--uitext);}
  .btn:hover{border-color:var(--teal);}
  .btn.primary{background:var(--gold);border-color:var(--gold);color:#3a2c05;}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.ghost{background:transparent;}
  .dim-note{font-size:11px;color:var(--uimut);margin-left:2px;}
  .ctrl .chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--uimut);font-weight:600;cursor:pointer;user-select:none;}
  .ctrl .chk input{accent-color:var(--gold);width:14px;height:14px;cursor:pointer;}

  .stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:24px;background:
     radial-gradient(circle at 50% 0,#15201b,#0d1410 70%);}
  #ptarget{transform-origin:top center;}
  .stage .frame{filter:drop-shadow(0 14px 30px rgba(0,0,0,.45));}
  .stage .ply{filter:drop-shadow(0 18px 40px rgba(0,0,0,.5));}

  /* print plumbing */
  #printroot{position:absolute;left:-99999px;top:0;}
  #printscale{display:inline-block;transform-origin:top left;}
  @media print{
    .app{display:none !important;}
    #printroot{position:absolute;left:0;top:0;}
    html,body{background:#fff;}
    /* without this, browsers drop background colours/images — every green/gold panel,
       the QR codes and the pattern bands would print white. */
    #printroot, #printroot *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
  }
  /* also keep colours saturated in the on-screen preview backdrop */
  #ptarget *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  /* ======================================================================
     PILLAR COMPONENTS — ported verbatim from renders/pillar_all_sides_measured.html
     (the spec drawing). All sizes are in design px at 1in = 8.38px.
     ====================================================================== */
  .frame{position:relative;}
  .ply{position:relative;width:218px;height:704px;border-radius:9px;overflow:hidden;
    background:
      repeating-linear-gradient(91deg, rgba(120,80,30,.05) 0 2px, transparent 2px 7px),
      repeating-linear-gradient(89deg, rgba(150,100,40,.045) 0 1px, transparent 1px 15px),
      linear-gradient(180deg,#e7c79a 0%,#e3c190 14%,#e8cd9c 30%,#dfba84 48%,#e6c794 66%,#e3c08c 82%,#e0bd88 100%);
    padding:10px 10px 11px;display:flex;flex-direction:column;}
  .ply::before{content:'';position:absolute;inset:0;border-radius:9px;border:1px solid rgba(90,60,25,.25);pointer-events:none;z-index:30;}
  .mount{position:relative;z-index:5;border-radius:6px;box-shadow:0 5px 12px rgba(50,32,10,.32);}

  .toprow{display:flex;}
  .toprow .tt{width:9px;height:9px;flex:0 0 auto;overflow:hidden;}
  .toprow .tt svg{display:block;width:100%;height:100%;}
  /* real brand pattern band (crops of brand/Foundry_Pattern.jpg, 8x6 grid of square tiles).
     Scaled so one tile row = the 9px band height; --prow (0..5) picks which row shows. */
  .patband{height:9px;width:100%;overflow:hidden;background:var(--forest);
    background-image:url('../brand/Foundry_Pattern.jpg');
    background-size:auto 54px; background-repeat:repeat-x;
    background-position-x:0; background-position-y:calc(var(--prow,0) * -9px);}
  .hdrgreen{background:var(--green);border-radius:6px;overflow:hidden;position:relative;}
  .hdrgreen .band{padding:9px 10px 10px;text-align:center;position:relative;}
  .hdrgreen .gco{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(127,166,83,.16);top:-22px;right:-18px;z-index:0;}
  .hdrgreen .eyebrow{position:relative;z-index:2;font-size:6px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--teal);}
  .hdrgreen h3{position:relative;z-index:2;font-size:18px;line-height:.9;font-weight:900;letter-spacing:-.02em;text-transform:uppercase;color:#fff;margin:3px 0 0;}
  .hdrgreen h3 em{font-style:normal;color:var(--gold);}
  .hdrgreen .rule{position:relative;z-index:2;margin:6px auto 0;width:36px;height:2px;border-radius:1px;background:var(--gold);}
  .hdrgreen .wmwrap{position:relative;z-index:2;display:flex;justify-content:center;}
  .hdrgreen .wmwrap svg{width:128px;height:auto;display:block;}

  .gpanel{background:var(--green);color:var(--paper);position:relative;overflow:hidden;padding:10px 10px;border-radius:6px;}
  .gpanel .gco{position:absolute;z-index:0;}
  .gpanel .c1{width:80px;height:80px;border-radius:50%;background:rgba(127,166,83,.15);top:-24px;right:-26px;}
  .gpanel .c2{width:40px;height:40px;background:rgba(6,61,42,.5);transform:rotate(45deg);bottom:-16px;left:-14px;}
  .gpanel .lbl{position:relative;z-index:2;font-size:6px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--teal);}
  .gpanel .big{position:relative;z-index:2;font-size:15px;font-weight:900;line-height:.95;text-transform:uppercase;letter-spacing:-.02em;color:#fff;margin:3px 0 0;}
  .gpanel .big em{font-style:normal;color:var(--gold);}
  .gpanel p{position:relative;z-index:2;font-size:7.5px;line-height:1.4;color:rgba(247,244,236,.92);margin:6px 0 0;}
  .gpanel p b{color:var(--gold);}

  /* added "Text box" section */
  .tblock{background:var(--paper);border-radius:6px;padding:10px 11px;position:relative;overflow:hidden;}
  .tblock h5{font-size:7.5px;letter-spacing:.03em;text-transform:uppercase;font-weight:900;color:var(--green);margin:0 0 4px;}
  .tblock p{font-size:7px;line-height:1.45;color:#33342c;margin:0;white-space:pre-line;}
  .tblock p b{color:var(--green);} .tblock p em{font-style:normal;color:#b8860b;font-weight:700;}

  /* ---- per-section colourway text schemes (v-light = dark text, v-dark = light text);
     the background colour itself comes from the cw-* classes ---- */
  .gpanel.v-light .gco{display:none;}
  .gpanel.v-light .lbl{color:var(--green);}
  .gpanel.v-light .big{color:var(--forest);}
  .gpanel.v-light .big em{color:#c79100;}
  .gpanel.v-light p{color:#3a3b32;}
  .gpanel.v-light p b{color:var(--green);}
  .gpanel.v-light .where{background:rgba(242,180,23,.16);border-color:rgba(242,180,23,.6);}
  .gpanel.v-light .where span{color:var(--forest);}
  .caps.v-light .ct2{color:var(--green);}
  .caps.v-light .cap i{background:rgba(13,91,62,.05);border-color:rgba(242,180,23,.6);}
  .caps.v-light .cap span{color:#56564c;}
  .qrow.v-light .qco{display:none;}
  .qrow.v-light .qt{color:var(--forest);}
  .qrow.v-light .qt b{color:var(--green);}
  .qrow.v-light .qt small{color:var(--green);}
  .info.v-light .ih{color:var(--green);}
  .info.v-light p{color:#33342c;}
  .info.v-light p b{color:var(--green);}
  .more.v-dark p{color:rgba(247,244,236,.92);}
  .more.v-dark p b{color:var(--gold);}
  .flow.v-dark .ft{color:var(--teal);}
  .flow.v-dark .step h4{color:#fff;}
  .flow.v-dark .step p{color:rgba(247,244,236,.8);}
  .flow.v-dark .step .arr{color:var(--gold);}
  .train.v-dark .tlbl{color:var(--teal);}
  .train.v-dark .tbig{color:#fff;}
  .train.v-dark p{color:rgba(247,244,236,.85);}
  .train.v-dark p b{color:var(--gold);}
  .tblock.v-dark h5{color:var(--teal);}
  .tblock.v-dark p{color:rgba(247,244,236,.92);}
  .tblock.v-dark p b{color:var(--gold);} .tblock.v-dark p em{color:var(--gold);}

  .more{background:var(--paper);border-radius:6px;padding:9px 10px;}
  .more p{font-size:7px;line-height:1.42;color:#33342c;margin:0;}
  .more p b{color:var(--green);}
  .more .free{display:inline-block;margin-top:6px;background:var(--gold);color:var(--forest);font-size:6px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:3px;}

  .caps{background:var(--forest);border-radius:6px;padding:9px 9px;}
  .ct2{font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--teal);text-align:center;margin-bottom:7px;}
  .capgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
  .cap{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .cap i{width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,.07);border:1px solid rgba(242,180,23,.4);display:flex;align-items:center;justify-content:center;}
  .cap i svg{width:13px;height:13px;}
  .cap span{font-size:4.2px;letter-spacing:.005em;text-transform:uppercase;font-weight:700;color:rgba(247,244,236,.78);text-align:center;line-height:1.15;word-break:break-word;hyphens:auto;}

  .flow{background:var(--paper);border-radius:6px;padding:9px 9px;}
  .ft{font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--green);text-align:center;margin-bottom:8px;}
  .steps{display:flex;gap:4px;}
  .step{flex:1;text-align:center;position:relative;}
  .step .n{width:16px;height:16px;border-radius:50%;background:var(--gold);color:var(--forest);font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}
  .step h4{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;color:var(--forest);margin:0;line-height:1;}
  .step p{font-size:5.5px;color:#56564c;line-height:1.2;margin:3px 0 0;}
  .step .arr{position:absolute;top:7px;right:-4px;color:#c9a23a;font-size:10px;font-weight:900;}

  .qrow{background:var(--green);border-radius:6px;padding:9px 10px;display:flex;align-items:center;gap:9px;position:relative;overflow:hidden;}
  .qrow .qco{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(127,166,83,.13);top:-20px;right:-18px;z-index:0;}
  .qr{flex:0 0 auto;background:#fff;border:1.5px solid var(--gold);border-radius:3px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);padding:2px;gap:1px;position:relative;z-index:2;}
  .qr.s{width:36px;height:36px;} .qr.m{width:40px;height:40px;}
  .qr i{background:var(--forest);border-radius:1px;} .qr i.o{background:transparent;}
  .qrow .qt{position:relative;z-index:2;font-size:7.5px;font-weight:700;color:#fff;line-height:1.35;}
  .qrow .qt b{color:var(--gold);display:block;font-size:8.5px;margin-top:1px;}
  .qrow .qt small{color:var(--teal);font-size:6px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}

  .calwrap{position:relative;z-index:5;display:flex;justify-content:center;}
  .holder{position:relative;width:108px;background:#fff;border-radius:3px;padding:6px 6px 8px;box-shadow:0 5px 12px rgba(50,32,10,.32), inset 0 0 0 1px rgba(0,0,0,.08);}
  .holder::before,.holder::after{content:'';position:absolute;top:-3px;width:22px;height:6px;border-radius:2px;background:#cfcaba;z-index:6;}
  .holder::before{left:16px;} .holder::after{right:16px;}
  .sheet{aspect-ratio:8.5/11;display:flex;flex-direction:column;background:#fff;}
  .sheet .sct{font-size:6.5px;font-weight:900;letter-spacing:.02em;text-transform:uppercase;color:var(--green);text-align:center;margin:1px 0 1px;}
  .sheet .csub{font-size:4.5px;letter-spacing:.04em;text-transform:uppercase;color:#a8a496;text-align:center;margin-bottom:3px;}
  .gcal{flex:1;display:flex;flex-direction:column;gap:1px;}
  .gcal .gday{flex:1;display:flex;gap:2px;align-items:stretch;}
  .gcal .gd{flex:0 0 13px;font-size:4.5px;font-weight:800;color:#8a8a7d;text-transform:uppercase;display:flex;align-items:center;}
  .gcal .gevs{flex:1;display:flex;flex-direction:column;gap:.5px;justify-content:center;}
  .gcal .ev{font-size:4px;font-weight:700;line-height:1.1;border-radius:1px;padding:.5px 1.5px;color:#fff;overflow:hidden;white-space:nowrap;}
  .ev.r{background:var(--gold);color:#5e4505;} .ev.t{background:var(--teal);color:#0c4a45;} .ev.s{background:var(--sage);color:#21380f;} .ev.g{background:var(--green);}
  .gcal .gday + .gday{border-top:.5px solid #eee;}
  .ckey{display:flex;gap:4px;justify-content:center;margin-top:3px;font-size:4px;color:#6a6a5e;}
  .ckey i{width:5px;height:5px;border-radius:1px;display:inline-block;vertical-align:-1px;margin-right:1.5px;}

  .wb{background:#fbfbf9;border-radius:5px;position:relative;box-shadow:inset 0 0 0 2px #cfcabd;aspect-ratio:24/18;padding:9px 9px 0;display:flex;flex-direction:column;}
  .wb .tab{position:absolute;top:-6px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;font-size:5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:1.5px 7px;border-radius:0 0 3px 3px;z-index:8;}
  .wb .dim{position:absolute;top:4px;right:6px;font-size:4.5px;font-weight:700;color:#bdb8a8;}
  .wb .scrawl{font-size:9px;color:#2f6aa0;font-weight:600;line-height:1.3;font-family:'Bradley Hand','Segoe Print',cursive;}
  .wb .scrawl small{display:block;font-size:7px;color:#cf5a3a;margin-top:4px;}
  .wb .scrawl .gr{display:block;font-size:7px;color:#3f8a4a;margin-top:3px;}
  .wb .tray{position:absolute;left:9px;right:9px;bottom:4px;height:3px;border-radius:2px;background:#e3ded0;}
  .wb .marker{position:absolute;bottom:7px;width:15px;height:4px;border-radius:2px;}
  .wb .marker.o{right:11px;background:#d85a30;} .wb .marker.g{right:30px;background:var(--green);} .wb .marker.b{right:49px;background:#3f7fb0;}

  .info{background:var(--forest);border-radius:5px;padding:9px 9px;position:relative;overflow:hidden;}
  .info .ih{position:relative;z-index:2;font-size:6px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--teal);margin-bottom:6px;text-align:center;}
  .info .ir{display:flex;gap:6px;position:relative;z-index:2;}
  .info .ir + .ir{margin-top:5px;}
  .info .pill{flex:0 0 auto;font-size:5.5px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;padding:2px 5px;border-radius:3px;height:fit-content;}
  .info .pill.gold{background:var(--gold);color:var(--forest);} .info .pill.teal{background:var(--teal);color:#06403b;}
  .info p{font-size:6.5px;line-height:1.34;color:rgba(247,244,236,.92);margin:0;}
  .info p b{color:var(--gold);}

  .posters{display:grid;grid-template-columns:1fr 1fr;gap:7px;position:relative;z-index:5;}
  .poster{aspect-ratio:11/17;border-radius:4px;box-shadow:0 3px 8px rgba(50,32,10,.34);overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:6px 6px 5px;}
  .poster.p1{background:var(--forest);} .poster.p2{background:var(--teal);}
  .poster .pdate{font-size:5.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);margin-top:5px;}
  .poster.p2 .pdate{color:#06403b;}
  .poster .pband{height:6px;border-radius:2px;background:var(--gold);width:60%;margin-top:3px;}
  .poster.p2 .pband{background:var(--forest);}
  .poster .ph{font-size:9px;font-weight:900;line-height:.95;text-transform:uppercase;color:#fff;}
  .poster.p2 .ph{color:var(--forest);}
  .poster .pq{width:11px;height:11px;border:1.5px solid var(--gold);border-radius:2px;align-self:flex-end;}
  .poster.p2 .pq{border-color:var(--forest);}
  .poster .posterimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:3;}
  .cap i img{width:100%;height:100%;object-fit:contain;padding:2px;}

  .sectionhdr{display:flex;align-items:center;gap:6px;background:var(--forest);border-radius:5px;padding:6px 9px;margin-bottom:11px;position:relative;}
  .sectionhdr .dotlive{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px rgba(242,180,23,.28);flex:0 0 auto;}
  .sectionhdr .sht{font-size:7.5px;font-weight:900;letter-spacing:.02em;text-transform:uppercase;color:#fff;line-height:1;}
  .sectionhdr .shsub{margin-left:auto;font-size:5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);}
  .plaquerow{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .rowrail{position:absolute;top:-5px;left:4px;right:4px;height:3px;border-radius:2px;background:rgba(90,60,25,.32);z-index:4;}
  .rowrail::before,.rowrail::after{content:'';position:absolute;top:-1.5px;width:5px;height:5px;border-radius:50%;border:1px solid rgba(90,60,25,.45);}
  .rowrail::before{left:-2px;} .rowrail::after{right:-2px;}
  .plaque{aspect-ratio:1/1;border-radius:4px;overflow:hidden;position:relative;box-shadow:0 3px 8px rgba(50,32,10,.34);background:var(--green);display:flex;flex-direction:column;}
  .plaque .pat{position:absolute;inset:0;z-index:0;opacity:.24;}
  .plaque .pat svg{width:100%;height:100%;display:block;}
  .plaque .inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:6px 3px 5px;}
  .plaque .photo{width:26px;height:26px;border-radius:4px;flex:0 0 auto;background:var(--forest);border:2px solid #fff;display:flex;align-items:center;justify-content:center;position:relative;}
  .plaque .photo .ph-init{font-size:10px;font-weight:900;color:var(--teal);}
  .plaque .photo .ph-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:3px;}
  .plaque .photo .tape{position:absolute;top:-3px;left:50%;transform:translateX(-50%) rotate(-4deg);width:13px;height:6px;background:rgba(242,180,23,.6);}
  .plaque .pname{font-size:7px;font-weight:900;line-height:.96;text-transform:uppercase;letter-spacing:-.01em;color:#fff;margin-top:5px;}
  .plaque .ppill{display:inline-block;margin-top:3px;background:var(--gold);color:var(--forest);font-size:4.5px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;padding:1px 4px;border-radius:2px;}
  .plaque .prole{font-size:5px;font-weight:700;color:var(--teal);margin-top:4px;line-height:1.2;}
  .plaque .prole b{color:#fff;}
  .empty{aspect-ratio:1/1;border-radius:4px;border:1.5px dashed rgba(90,60,25,.42);background:rgba(255,255,255,.05);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .empty .ecleat{position:absolute;top:9px;left:9px;right:9px;height:3px;border-radius:2px;background:rgba(90,60,25,.34);}
  .empty .eicon{width:15px;height:15px;border-radius:50%;border:1.5px dashed rgba(90,60,25,.5);display:flex;align-items:center;justify-content:center;color:rgba(90,60,25,.6);font-size:10px;font-weight:300;margin-top:6px;}
  .empty .etxt{font-size:4.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:rgba(90,60,25,.62);text-align:center;margin-top:4px;}
  /* plaque pieces print edge-to-edge at exactly 8x8 (no wood frame / padding) */
  .frame.plaquepiece{background:transparent;padding:0;}

  /* print-marks mode: square the outer trim so the colour bleed lines up cleanly */
  .marksmode .frame,.marksmode .ply,.marksmode .poster,.marksmode .plaque,.marksmode .empty{border-radius:0 !important;box-shadow:none !important;}

  .train{background:var(--paper);border-radius:6px;padding:9px 9px;display:flex;align-items:center;gap:8px;}
  .train .tinfo{flex:1;}
  .train .tlbl{font-size:5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--green);}
  .train .tbig{font-size:11px;font-weight:900;line-height:.98;text-transform:uppercase;letter-spacing:-.01em;color:var(--forest);margin:2px 0 0;}
  .train p{font-size:6px;line-height:1.32;color:#56564c;margin:4px 0 0;}
  .train p b{color:var(--green);}
  .apron{width:9px;height:11px;flex:0 0 auto;}
  .where{display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:rgba(242,180,23,.14);border:1px solid rgba(242,180,23,.5);border-radius:4px;padding:3px 7px 3px 5px;position:relative;z-index:2;}
  .where span{font-size:5.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;}

  .gap{position:relative;flex:1 1 auto;min-height:24px;display:flex;align-items:center;justify-content:center;}
  .gap .ghost{font-size:5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:rgba(90,60,25,.3);transform:rotate(-90deg);white-space:nowrap;}

  .lowband{background:var(--forest);border-radius:6px;overflow:hidden;position:relative;margin-bottom:8px;}
  .lpat{display:flex;height:9px;background:var(--forest);}
  .lpat .lt{width:9px;height:9px;flex:0 0 auto;overflow:hidden;}
  .lpat .lt svg{display:block;width:100%;height:100%;}
  .lowband .lin{padding:8px 10px 9px;display:flex;align-items:center;gap:10px;}
  .lowband .lleft{flex:1;min-width:0;text-align:left;}
  .lowband .lright{flex:0 0 auto;display:flex;align-items:center;}
  .lowband .lwm{font-size:7.5px;font-weight:900;letter-spacing:.02em;text-transform:uppercase;color:#fff;}
  .lowband .lwm span{color:var(--gold);}
  .lowband .lwmmark{display:flex;justify-content:flex-end;}
  .lowband .lwmmark svg{width:88px;height:auto;display:block;}
  .lowband .lsoc{display:flex;flex-direction:column;gap:2.5px;justify-content:flex-start;}
  .lowband .socrow{display:flex;align-items:center;gap:3px;font-size:6px;font-weight:700;font-style:normal;color:rgba(255,255,255,.84);white-space:nowrap;}
  .lowband .socrow i{width:8px;height:8px;flex:0 0 auto;display:flex;}
  .lowband .socrow i svg{width:100%;height:100%;display:block;}
  .lowband .lhrs{font-size:5.5px;color:rgba(255,255,255,.72);line-height:1.5;margin-top:5px;text-align:left;}
  .lowband .lhrs b{color:#fff;font-weight:800;}
  .lowband .ldiv{width:1px;align-self:stretch;background:rgba(255,255,255,.14);flex:0 0 auto;}

  .ftr{background:var(--forest);border-radius:6px;overflow:hidden;border-top:2px solid var(--gold);}
  .ftr .fin{padding:7px 9px 8px;text-align:center;}
  .ftr .fmeta{font-size:5.5px;color:rgba(255,255,255,.64);line-height:1.5;}

  /* real QR codes (replace the placeholder grids when a URL is set) */
  .qrcode{flex:0 0 auto;background:#fff;border:1.5px solid var(--gold);border-radius:3px;padding:2px;position:relative;z-index:2;}
  .qrcode.s{width:36px;height:36px;} .qrcode.m{width:40px;height:40px;}
  .qrcode svg{display:block;width:100%;height:100%;}
  .poster .pq.has{background:#fff;padding:1px;}
  .poster .pq.has svg{display:block;width:100%;height:100%;}

  /* all-three-faces overview */
  .allfaces{display:flex;gap:16px;align-items:flex-start;padding:2px;}
  .facecol{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .facetitle{font-size:7px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#3a2c05;background:var(--gold);padding:2px 8px;border-radius:4px;white-space:nowrap;}

  /* panels rendered standalone get a hair of breathing room */
  .frame.panel{padding:0;}
  @media (max-width:880px){ .app{grid-template-columns:1fr;grid-template-rows:52px auto 1fr;} .editor{max-height:38vh;} }
</style>

  return `<svg viewBox="0 0 ${dim} ${dim}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg"><path fill="#063d2a" d="${d}"/></svg>`;
}
// QR tile that matches the .qr styling; falls back to the placeholder grid if blank/invalid.
function qrBox(size, url){
  url=(url==null?'':String(url)).trim();
  if(!url) return qrGrid(size);
  try{ return `<div class="qrcode ${size}">${qrSVG(url)}</div>`; }
  catch(e){ return qrGrid(size); }
}

/* ---- subtle motif backgrounds (pattern vocabulary, faint, one per section) ---- */
const MOTIF={
  nested:c=>`<rect x='16' y='16' width='68' height='68' fill='none' stroke='${c}' stroke-width='7'/><rect x='38' y='38' width='24' height='24' fill='${c}'/>`,
  chev:c=>`<g fill='none' stroke='${c}' stroke-width='9' stroke-linejoin='round'><path d='M12,28 L50,60 L88,28'/><path d='M12,58 L50,90 L88,58'/></g>`,
  fan:c=>`<g stroke='${c}' stroke-width='7'><line x1='100' y1='0' x2='0' y2='100'/><line x1='100' y1='28' x2='28' y2='100'/><line x1='100' y1='56' x2='56' y2='100'/><line x1='72' y1='0' x2='0' y2='72'/><line x1='44' y1='0' x2='0' y2='44'/></g>`,
  tri:c=>`<polygon points='0,0 100,0 0,100' fill='${c}'/>`,
  quarter:c=>`<path d='M100,40 A60,60 0 0,1 40,100 L100,100 Z' fill='${c}'/>`,
  diamond:c=>`<rect x='28' y='28' width='44' height='44' fill='none' stroke='${c}' stroke-width='8' transform='rotate(45 50 50)'/>`,
};
function motifBg(kind,color,pos,size){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>${MOTIF[kind](color)}</svg>`;
  // encode so the value is safe inside a double-quoted style="" attribute and a single-quoted url('')
  const enc=encodeURIComponent(svg).replace(/'/g,'%27').replace(/\(/g,'%28').replace(/\)/g,'%29');
  return `background-image:url('data:image/svg+xml,${enc}');background-repeat:no-repeat;background-position:${pos};background-size:${size};`;
}

/* ---- per-section panel backgrounds: wordmark (default) / pattern / motif / none ----
   Data URIs live once in an injected stylesheet; panels just get classes, so re-renders
   stay cheap. Tone classes (pt-light/pt-dark) pick the tint; pc-* picks the pattern tone. */
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function svgUri(svg){ return `url('data:image/svg+xml,${encodeURIComponent(svg).replace(/'/g,'%27')}')`; }
const WM_BG_ONDARK  = svgUri(wm('#ffffff').replace('<svg ', "<svg opacity='0.09' "));
const WM_BG_ONLIGHT = svgUri(wm('#0d5b3e').replace('<svg ', "<svg opacity='0.11' "));
const MOTIF_BG_LIGHT= svgUri(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>${MOTIF.chev('rgba(108,197,192,0.14)')}</svg>`);
const MOTIF_BG_DARK = svgUri(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>${MOTIF.nested('rgba(13,91,62,0.13)')}</svg>`);
// the Foundry mark (three overlapping shapes) and a 2x2 motif cluster
function markSvg(c){ return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='16' y='34' width='40' height='40' fill='${c}'/><circle cx='61' cy='44' r='21' fill='${c}'/><polygon points='50,22 74,68 26,68' fill='${c}'/></svg>`; }
function clusterSvg(c){ return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><g fill='${c}' stroke='${c}'><polygon points='0,0 100,0 0,100' stroke='none'/><circle cx='150' cy='50' r='34' fill='none' stroke-width='8'/><rect x='118' y='118' width='64' height='64' fill='none' stroke-width='8'/><g fill='none' stroke-width='7'><line x1='0' y1='150' x2='50' y2='110'/><line x1='0' y1='180' x2='80' y2='110'/></g></g></svg>`; }
const MARK_BG_ONDARK   = svgUri(markSvg('rgba(255,255,255,0.11)'));
const MARK_BG_ONLIGHT  = svgUri(markSvg('rgba(13,91,62,0.12)'));
const CLUSTER_BG_ONDARK= svgUri(clusterSvg('rgba(108,197,192,0.13)'));
const CLUSTER_BG_ONLIGHT=svgUri(clusterSvg('rgba(13,91,62,0.12)'));
const BG_OPTS=[
  {v:'wordmark',l:'Wordmark'},

const TINT_TREATMENTS=['wordmark','mark','motif','cluster','stripes','grid'];
function panelBgClass(b, tint, pc){
  const t=(b&&b.pattern)||'wordmark';
  if(t==='none') return '';
  const pt = tint==='light'?'pt-light':'pt-dark';
  if(TINT_TREATMENTS.includes(t)) return `bgp-${t} ${pt}`;
  if(t==='pattern')   return `bgp-pattern ${pc}`;
  if(t==='patternlg') return `bgp-patternlg ${pc}`;
  if(t==='patcorner') return `bgp-patcorner ${pc.replace('pc-','pcc-')}`;
  return '';
}
// per-section colourway. Each colour has a text scheme (light text on dark bg, or vice
// versa); a panel gets the matching text-variant class + a cw- background + bg tint.
const COLOR_OPTS=[{v:'',l:'Default'},{v:'green',l:'Green'},{v:'forest',l:'Forest'},{v:'paper',l:'Paper'},{v:'gold',l:'Gold'},{v:'teal',l:'Teal'},{v:'sage',l:'Sage'}];
const CW_HEX={green:'#0d5b3e',forest:'#04291b',paper:'#fbfaf6',gold:'#f2b417',teal:'#54c1ba',sage:'#7fa653'};
const CW_SCHEME={green:'ondark',forest:'ondark',paper:'onlight',gold:'onlight',teal:'onlight',sage:'onlight'};
function panelColor(b, nativeCw){
  const cw=(b&&b.color)||nativeCw;
  const scheme=CW_SCHEME[cw]||CW_SCHEME[nativeCw];
  const nativeScheme=CW_SCHEME[nativeCw];
  const v = scheme===nativeScheme ? '' : (scheme==='onlight'?'v-light':'v-dark'); // flip text colours
  const cwCls = cw===nativeCw ? '' : 'cw-'+cw;                                      // override bg colour
  const tint = scheme==='ondark' ? 'light' : 'dark';                               // watermark tint
  return {cls:(v+' '+cwCls).trim(), tint, pc:'pc-'+cw};
}
(function injectBgStyles(){
  const P="url('../brand/Foundry_Pattern.jpg')";
  const grad=(hex,a)=>`linear-gradient(${hexA(hex,a)},${hexA(hex,a)})`;
  const corner=(hex)=>`radial-gradient(135% 135% at 100% 0,transparent 0,${hexA(hex,1)} 52%)`;

  .bgp-motif{background-repeat:no-repeat;background-position:right -4px top -2px;background-size:40%;}

  .bgp-stripes{background-repeat:repeat;background-position:0 0;background-size:auto;}
  .bgp-stripes.pt-light{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 2px,transparent 2px 13px);}
  .bgp-stripes.pt-dark{background-image:repeating-linear-gradient(45deg,rgba(13,91,62,.09) 0 2px,transparent 2px 13px);}
  .bgp-grid{background-repeat:repeat;background-position:0 0;background-size:15px 15px;}
  .bgp-grid.pt-light{background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);}
  .bgp-grid.pt-dark{background-image:linear-gradient(rgba(13,91,62,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(13,91,62,.09) 1px,transparent 1px);}
  .bgp-pattern{background-repeat:no-repeat,repeat;background-position:center;background-size:cover,150px;}
  .bgp-patternlg{background-repeat:no-repeat,repeat;background-position:center;background-size:cover,300px;}
  .bgp-patcorner{background-repeat:no-repeat,repeat;background-position:center;background-size:cover,150px;}`;
  // per-colourway: background-colour + pattern-overlay tints (all six brand colours)
  for(const [name,hex] of Object.entries(CW_HEX)){
    const a = name==='gold'?.85 : name==='paper'?.92 : .9;
    const ring = CW_SCHEME[name]==='onlight' ? 'rgba(10,38,27,.14)' : 'rgba(255,255,255,.13)';
    css+=`.cw-${name}{background-color:${hex};box-shadow:inset 0 0 0 1px ${ring};}`
      +`.bgp-pattern.pc-${name}{background-image:${grad(hex,a)},${P};}`
      +`.bgp-patternlg.pc-${name}{background-image:${grad(hex,a-.02)},${P};}`
      +`.bgp-patcorner.pcc-${name}{background-image:${corner(hex)},${P};}`;
  }
  const s=document.createElement('style'); s.textContent=css; document.head.appendChild(s);
})();

/* ============================ state + persistence ============================ */
let state = load();
function load(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORE_KEY)||'null');
    if(saved) return mergeSaved(saved);
  }catch(e){}
  return defaults();
}
// Merge saved content over defaults, but take each side's `layout` wholesale (it is
// order-sensitive — index-merging would scramble a reordered / added-to section list).
function mergeSaved(saved){
  const m=deepMerge(defaults(), saved);
  for(const sd of ['s1','s2','s3']){ if(saved && saved[sd] && Array.isArray(saved[sd].layout)) m[sd].layout=saved[sd].layout; }
  return m;
}
function deepMerge(base, over){
  if(Array.isArray(base)){
    if(!Array.isArray(over)) return base;
    // keep base's length so a shorter saved/imported array never drops fixed-arity slots
    const len=Math.max(base.length, over.length), out=[];
    for(let i=0;i<len;i++){
      if(i>=over.length) out.push(base[i]);
      else if(base[i]&&typeof base[i]==='object') out.push(deepMerge(base[i]??{}, over[i]));
      else out.push(over[i]);
    }
    return out;
  }
  if(base && typeof base==='object'){
    const out={...base};
    for(const k in over){ out[k] = (base[k]&&typeof base[k]==='object'&&over[k]&&typeof over[k]==='object')? deepMerge(base[k], over[k]) : over[k]; }
    return out;
  }
  return over;
}
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const el=document.getElementById('savestate');
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      el.textContent='Saved locally ✓';
      setTimeout(()=>{ if(el.textContent==='Saved locally ✓') el.textContent='Saved locally'; },1200);
    }catch(err){
      el.textContent='⚠ Too big to auto-save — use Export';
    }
  },180);
}
function get(path){ return path.split('.').reduce((o,k)=> (o==null?o:o[k]), state); }
function set(path,val){
  const parts=path.split('.'); let o=state;
  for(let i=0;i<parts.length-1;i++){
    if(o[parts[i]]==null){ o[parts[i]] = /^\d+$/.test(parts[i+1]) ? [] : {}; } // auto-create missing intermediates
    o=o[parts[i]];
  }
  o[parts[parts.length-1]]=val;
}

/* ============================ text formatting ============================ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }
// *gold emphasis*, **bold**, newlines -> <br>
function fmt(s){
  let t=esc(s);
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  return t;
}

// w/h in inches. If h omitted, height is content-driven (aspect-ratio handles fixed pieces).
// Export targets follow the live layout: whole face, then each enabled section
// (sub-split into individual posters/plaques), then footer.
function targetsFor(side){
  const T=[{id:'face',label:'Whole face — 26×84″'},{id:'header',label:'Header band',w:23,r:()=>cHeader(side)}];
  for(const b of (state[side].layout||[])){
    if(!b.on) continue; const def=BLOCKS[b.type]; if(!def) continue;
    if(b.type==='posters'){
      T.push({id:'p1',label:'Poster 1 — 11×17″',w:11,r:()=>cPoster(0)},{id:'p2',label:'Poster 2 — 11×17″',w:11,r:()=>cPoster(1)});
    } else if(b.type==='shift'){
      T.push({id:'pl1',label:'Scout plaque 1 — 8×8″',w:8,plaque:true,r:()=>plaque(0)},
             {id:'pl2',label:'Scout plaque 2 — 8×8″',w:8,plaque:true,r:()=>plaque(1)},
             {id:'pl3',label:'Scout plaque 3 — 8×8″',w:8,plaque:true,r:()=>plaque(2)});
    } else if(b.type==='calendar'){
      T.push({id:'cal',label:'Weekly calendar — 8.5×11″',w:8.5,bg:'#fff',r:()=>cCalSheet()});
    } else if(b.type==='whiteboard'){
      /* physical board — not an export */
    } else {
      T.push({id:b.id,label:def.label+' panel',w:23,r:()=>def.render(b)});
    }
  }
  T.push({id:'footer',label:'Footer band',w:23,r:()=>cFooter(side)});
  return T;
}

// Load an image file, downscale it on a canvas, return a data URL (keeps localStorage small).
function loadDownscaled(file, maxDim, mime){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onerror=()=>rej(new Error('read failed'));
    fr.onload=()=>{
      const img=new Image();
      img.onerror=()=>rej(new Error('not an image'));
      img.onload=()=>{
        const s=Math.min(1, maxDim/Math.max(img.width,img.height));
        const cw=Math.max(1,Math.round(img.width*s)), ch=Math.max(1,Math.round(img.height*s));
        const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        cv.getContext('2d').drawImage(img,0,0,cw,ch);
        res(cv.toDataURL(mime, mime==='image/jpeg'?0.85:undefined));
      };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}

/* ============================ wiring ============================ */
const ui={ tab:'s1', side:'s1', target:'face' };
const editorEl=document.getElementById('editor');
const stageEl=document.getElementById('stage');
const targetSel=document.getElementById('target');
const dimNote=document.getElementById('dimnote');

function autoGrow(el){ el.style.height='auto'; el.style.height=(el.scrollHeight+2)+'px'; }
function renderEditor(){
  editorEl.innerHTML=editorHTML(ui.tab);
  editorEl.scrollTop=0;
  editorEl.querySelectorAll('textarea').forEach(autoGrow);
}
function renderTargetSelect(){
  let list;
  if(ui.tab==='all'){ list=[{id:'all',label:'All three faces — one wide sheet'}]; ui.target='all'; }
  else { list=targetsFor(ui.side); if(!list.find(t=>t.id===ui.target)) ui.target='face'; }
  targetSel.innerHTML=list.map(t=>`<option value="${t.id}"${t.id===ui.target?' selected':''}>${t.label}</option>`).join('');
  targetSel.value=ui.target;
  targetSel.disabled = (ui.tab==='all');
  updateDimNote();
}
function updateDimNote(){
  if(ui.tab==='all'){ dimNote.textContent='Whole pillar · ~82×84″ large-format'; return; }
  const t=targetsFor(ui.side).find(x=>x.id===ui.target);
  if(!t){ dimNote.textContent=''; return; }
  if(t.id==='face'){ dimNote.textContent='Large-format · for a print shop'; }
  else if(t.w<=11){ dimNote.textContent='Desktop-printable size'; }
  else { dimNote.textContent='Panel · ~'+t.w+'″ wide'; }
}
function renderPreview(){
  setRenderCtx(ui.side);
  stageEl.innerHTML=`<div id="ptarget">${renderTarget(ui.side, ui.target)}</div>`;
  fitPreview();
}
function fitPreview(){
  const el=document.getElementById('ptarget');
  if(!el) return;
  el.style.zoom='1';
  const natW=el.offsetWidth||1, natH=el.offsetHeight||1;
  const availW=stageEl.clientWidth-48, availH=stageEl.clientHeight-48;
  let z=Math.min(availW/natW, availH/natH);
  z=Math.max(0.22, Math.min(z, 3.0));
  el.style.zoom=z;
}
function renderAll(){ renderEditor(); renderTargetSelect(); renderPreview(); }

// editor input binding (event delegation)
editorEl.addEventListener('input', e=>{
  const t=e.target;
  if(t.tagName==='TEXTAREA') autoGrow(t);
  if(t.dataset.secfield){ // content of an added section (text / custom QR) lives in the block
    const b=(state[ui.side].layout||[]).find(x=>x.id===t.dataset.secid);
    if(b){ b[t.dataset.secfield]=t.value; persist(); renderPreview(); }
    return;
  }
  const path=t.dataset.path; if(!path) return;
  set(path, t.value);
  persist();
  // light-touch: re-render preview only (keep editor focus/caret intact)
  renderPreview();
});
// section toggle (checkbox) and add-section (select) both fire 'change'
editorEl.addEventListener('change', e=>{
  const t=e.target;
  if(t.dataset.sectog!==undefined && t.type==='checkbox'){
    const b=(state[ui.side].layout||[]).find(x=>x.id===t.dataset.sectog);
    if(b){ b.on=t.checked; persist(); renderPreview(); renderTargetSelect(); }
    return;
  }
  if(t.dataset.secbg!==undefined){
    const b=(state[ui.side].layout||[]).find(x=>x.id===t.dataset.secbg);
    if(b){ b.pattern=t.value; persist(); renderPreview(); }
    return;
  }
  if(t.dataset.seccolor!==undefined){
    const b=(state[ui.side].layout||[]).find(x=>x.id===t.dataset.seccolor);
    if(b){ b.color=t.value||undefined; persist(); renderPreview(); }
    return;
  }
  if(t.dataset.secadd!==undefined){ const v=t.value; t.value=''; addSection(ui.side, v); }
});
// drag-to-reorder sections
let dragId=null;
editorEl.addEventListener('dragstart', e=>{
  const it=e.target.closest('.secitem'); if(!it) return;
  if(e.target.closest('input,textarea,select,button')){ e.preventDefault(); return; } // let controls work normally
  dragId=it.dataset.secid; it.classList.add('dragging'); e.dataTransfer.effectAllowed='move';
  try{ e.dataTransfer.setData('text/plain', dragId); }catch(_){}
});
editorEl.addEventListener('dragover', e=>{ if(dragId && e.target.closest('.secitem')) e.preventDefault(); });
editorEl.addEventListener('drop', e=>{
  const it=e.target.closest('.secitem'); if(!it||!dragId) return; e.preventDefault();
  const overId=it.dataset.secid;
  if(overId!==dragId){
    const r=it.getBoundingClientRect(); const after=(e.clientY-r.top) > r.height/2;
    moveBlock(ui.side, dragId, overId, after);
    persist(); renderEditor(); renderTargetSelect(); renderPreview();
  }
});
editorEl.addEventListener('dragend', ()=>{ dragId=null; editorEl.querySelectorAll('.secitem.dragging').forEach(x=>x.classList.remove('dragging')); });
// textareas inside a collapsed <details> measure as 0-height; re-grow them when it opens
editorEl.addEventListener('toggle', e=>{
  if(e.target.tagName==='DETAILS' && e.target.open) e.target.querySelectorAll('textarea').forEach(autoGrow);
}, true);

// image upload / clear (Scout photos, poster artwork, custom icons)
const imgInput=document.getElementById('imginput');
let pendingImg=null;
editorEl.addEventListener('click', e=>{
  const pick=e.target.closest('[data-imgpick]');
  if(pick){ pendingImg={path:pick.dataset.imgpick, kind:pick.dataset.imgkind}; imgInput.value=''; imgInput.click(); return; }
  const clr=e.target.closest('[data-imgclear]');
  if(clr){ set(clr.dataset.imgclear, ''); persist(); renderEditor(); renderPreview(); return; }
  const del=e.target.closest('[data-secdel]');
  if(del){ const id=del.dataset.secdel; state[ui.side].layout=(state[ui.side].layout||[]).filter(b=>b.id!==id);
    persist(); renderEditor(); renderTargetSelect(); renderPreview(); }
});
imgInput.addEventListener('change', async e=>{
  const f=e.target.files[0]; if(!f||!pendingImg) return;
  const cfg=IMG_KINDS[pendingImg.kind]||{max:1000,mime:'image/jpeg'};
  try{
    const data=await loadDownscaled(f, cfg.max, cfg.mime);
    set(pendingImg.path, data); persist(); renderEditor(); renderPreview();
  }catch(err){ alert('Could not load that image: '+((err&&err.message)||err)); }
  pendingImg=null;
});

// tabs
document.getElementById('tabs').addEventListener('click', e=>{
  const b=e.target.closest('[data-tab]'); if(!b) return;
  ui.tab=b.dataset.tab;
  if(ui.tab==='s1'||ui.tab==='s2'||ui.tab==='s3'){ ui.side=ui.tab; ui.target='face'; }
  else if(ui.tab==='all'){ ui.target='all'; }
  else if(ui.tab==='shared'){ ui.target='face'; } // show a whole face so footer edits are visible
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===ui.tab));
  renderAll();
});

// target select
targetSel.addEventListener('change', e=>{ ui.target=e.target.value; updateDimNote(); renderPreview(); });

// print / save pdf
document.getElementById('printbtn').addEventListener('click', doPrint);
let pageStyle=document.createElement('style'); document.head.appendChild(pageStyle);
let printMarks=false;
document.getElementById('marks').addEventListener('change', e=>{ printMarks=e.target.checked; });

// full-bleed pieces → extend their edge into the bleed (solid colour, or the poster image)
const BLEED_COLOR={p1:'#063d2a',p2:'#6cc5c0',pl1:'#0d5b3e',pl2:'#0d5b3e',pl3:'#0d5b3e'};
function bleedBgFor(){
  if(ui.tab==='all') return null;
  const t=ui.target;
  if(t==='p1'||t==='p2'){ const p=state.s2.posters[t==='p1'?0:1]; if(p&&p.img) return `url('${p.img}') center/cover`; }
  return BLEED_COLOR[t]||null;
}

function cropMarks(W,H,pad,bleed,gap,mark,st){
  const o=bleed+gap, L=pad, R=pad+W, T=pad, B=pad+H;
  const vb=(x,y)=>`<div style="position:absolute;left:${x-st/2}px;top:${y}px;width:${st}px;height:${mark}px;background:#000;"></div>`;
  const hb=(x,y)=>`<div style="position:absolute;left:${x}px;top:${y-st/2}px;width:${mark}px;height:${st}px;background:#000;"></div>`;
  return [ vb(L,T-o-mark),hb(L-o-mark,T), vb(R,T-o-mark),hb(R+o,T),
           vb(L,B+o),hb(L-o-mark,B), vb(R,B+o),hb(R+o,B) ].join('');
}
function buildPrintScale(html){
  if(!printMarks) return `<div id="printscale">${html}</div>`;
  // measure trim at design scale (zoom 1)
  const root=document.getElementById('printroot');
  root.innerHTML=`<div id="measurebox" style="position:absolute;left:-99999px;top:0;">${html}</div>`;
  const el=document.getElementById('measurebox').firstElementChild;
  const W=el.offsetWidth, H=el.offsetHeight;
  const bc=bleedBgFor();
  const BLEED=(bc?0.125:0)*PXIN, GAP=0.06*PXIN, MARK=0.14*PXIN, ST=Math.max(0.1,0.012*PXIN), PAD=BLEED+GAP+MARK+0.02*PXIN;
  const bleedBox = bc ? `<div style="position:absolute;left:${PAD-BLEED}px;top:${PAD-BLEED}px;width:${W+2*BLEED}px;height:${H+2*BLEED}px;background:${bc};"></div>` : '';
  return `<div id="printscale" class="marksmode" style="position:relative;width:${W+2*PAD}px;height:${H+2*PAD}px;background:#fff;">`
    + bleedBox
    + `<div class="art" style="position:absolute;left:${PAD}px;top:${PAD}px;">${html}</div>`
    + cropMarks(W,H,PAD,BLEED,GAP,MARK,ST)
    + `</div>`;
}
function doPrint(){
  setRenderCtx(ui.side);
  const root=document.getElementById('printroot');
  const html=renderTarget(ui.side, ui.target);
  root.innerHTML=buildPrintScale(html);
  const ps=document.getElementById('printscale');
  ps.style.zoom=PRINT_ZOOM;
  const r=ps.getBoundingClientRect();           // forces layout; dims already scaled by zoom
  const win=(r.width/96), hin=(r.height/96);     // CSS px -> inches
  pageStyle.textContent=`@page{size:${win.toFixed(3)}in ${hin.toFixed(3)}in;margin:0;}`;
  window.print();
}
window.addEventListener('afterprint', ()=>{ document.getElementById('printroot').innerHTML=''; pageStyle.textContent=''; });

// export / import / reset
document.getElementById('exportbtn').addEventListener('click', ()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='foundry-kiosk-content.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
});
const fileInput=document.getElementById('fileinput');
document.getElementById('importbtn').addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ state=mergeSaved(JSON.parse(rd.result)); persist(); renderAll(); }catch(err){ alert('Could not read that file: '+err.message); } };
  rd.readAsText(f); fileInput.value='';
});
document.getElementById('resetbtn').addEventListener('click', ()=>{
  if(!confirm('Reset all copy back to the placeholder defaults? This clears your local edits.')) return;
  state=defaults(); localStorage.removeItem(STORE_KEY); renderAll();
});

window.addEventListener('resize', ()=>fitPreview());

// boot
document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===ui.tab));
renderAll();
</script>
</body>
</html>
